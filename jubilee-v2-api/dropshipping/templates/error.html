<!DOCTYPE html>
<html>
<head>
    <title>{{ error }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            margin: 20px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .error-container h1 {
            color: #d32f2f;
            font-size: 24px;
        }
        .error-container p {
            color: #666;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>{{ error }}</h1>
        <p>Please contact support if the problem persists.</p>
    </div>
</body>
</html>
